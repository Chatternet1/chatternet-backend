<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatternet — Home</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:24px;line-height:1.4}
  a{display:inline-block;margin:6px 0}
  .ok{color:green}.bad{color:#b91c1c}
  .card{padding:14px;border:1px solid #e5e7eb;border-radius:12px;max-width:680px}
</style>
</head><body>
<h1>Chatternet</h1>
<div class="card">
  <p>Pages:</p>
  <p>
    <a href="/messages.html">Messages</a> •
    <a href="/friends.html">Friends</a> •
    <a href="/settings.html">Settings</a> •
    <a href="/feed.html">Feed</a>
  </p>
  <p id="health">Checking health…</p>
</div>

<script src="/api.js"></script>
<script src="/auth.js"></script>
<script>
(async()=>{
  try{
    const h = await Api.get('/health');
    document.getElementById('health').innerHTML = 'Health: <span class="ok">OK</span> ('+h.node+')';
    // also make sure 'Me' exists on backend
    await Auth.ensureBackendUser();
  }catch(e){
    document.getElementById('health').innerHTML = 'Health: <span class="bad">DOWN</span> '+e.message;
  }
})();
</script>
</body></html>
