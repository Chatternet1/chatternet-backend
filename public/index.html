<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatternet – Home</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:0;background:#f6f7fb;color:#0f172a}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px;max-width:840px;margin:24px auto}
  a{color:#2563eb}
</style>
</head><body>
  <div class="card">
    <h1>Chatternet</h1>
    <p>Pages:</p>
    <p><a href="messages.html">Messages</a> • <a href="friends.html">Friends</a> • <a href="settings.html">Settings</a> • <a href="feed.html">Feed</a></p>
    <p>Health: <span id="health" style="font-weight:700;color:#dc2626">checking…</span></p>
  </div>

  <!-- load scripts (relative paths!) -->
  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script>
  (async () => {
    const el = document.getElementById('health');
    try {
      const h = await Api.health();
      el.textContent = 'UP • ' + new Date(h.time).toLocaleString();
      el.style.color = '#16a34a';
    } catch (e) {
      el.textContent = 'DOWN • ' + (e.message || 'unknown');
      el.style.color = '#dc2626';
    }
  })();
  </script>
</body></html>
