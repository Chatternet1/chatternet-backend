<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chatternet — Feed</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:0;background:#f6f7fb;color:#0f172a}
  .bar{background:#1d4ed8;color:#fff;padding:14px 16px;display:flex;gap:10px;align-items:center}
  .bar a{color:#fff;text-decoration:none;padding:8px 10px;border-radius:8px}
  .wrap{max-width:980px;margin:16px auto;padding:0 12px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px}
  input,textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px}
  .btn{padding:10px 14px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;cursor:pointer}
  .btn.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
  .post{border-top:1px dashed #e5e7eb;padding-top:10px;margin-top:10px}
</style>
</head>
<body>
<div class="bar">
  <strong>Chatternet — Feed</strong>
  <a href="/index.html">Home</a>
  <a href="/api/health" target="_blank">API Health</a>
</div>

<div class="wrap">
  <div class="card">
    <h3>Create a post</h3>
    <div class="row">
      <input id="title" placeholder="Title (optional)">
    </div>
    <div style="margin-top:8px">
      <textarea id="content" rows="4" placeholder="Say something..."></textarea>
    </div>
    <div style="margin-top:8px">
      <input id="media" placeholder="Media URL (Image / Video / YouTube — optional)">
    </div>
    <div style="margin-top:10px;display:flex;gap:10px">
      <button id="publish" class="btn primary">Publish</button>
      <button id="clear" class="btn">Clear</button>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h3>Recent posts</h3>
      <button id="refresh" class="btn">Refresh</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script src="/api.js"></script>
<script src="/auth.js"></script>
<script>
function postEl(p){
  const d=document.createElement('div'); d.className='post';
  d.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><strong>${p.title||'(no title)'}</strong> — <span class="muted">${new Date(p.createdAt).toLocaleString()}</span></div>
      <button data-del="${p.id}" class="btn">Delete</button>
    </div>
    <div style="margin-top:6px;white-space:pre-wrap">${p.content||''}</div>
    ${p.media?(`<div style="margin-top:8px"><a href="${p.media}" target="_blank">${p.media}</a></div>`):''}
  `;
  d.querySelector('[data-del]').onclick = async ()=>{ await Api.posts.remove(p.id); await refresh(); };
  return d;
}

async function refresh(){
  const list = await Api.posts.list();
  const box=document.getElementById('list'); box.innerHTML='';
  if(!list.length){ box.textContent='No posts yet.'; return; }
  list.forEach(p=>box.appendChild(postEl(p)));
}

(async()=>{
  const me = await Auth.ensureAccount();
  document.getElementById('publish').onclick = async ()=>{
    const title=document.getElementById('title').value.trim();
    const content=document.getElementById('content').value.trim();
    const media=document.getElementById('media').value.trim();
    if(!title && !content && !media){ alert('Write something.'); return; }
    await Api.posts.create({ title, content, media, authorName: me.name||'Me' });
    document.getElementById('title').value='';
    document.getElementById('content').value='';
    document.getElementById('media').value='';
    await refresh();
  };
  document.getElementById('clear').onclick = ()=>{ title.value=''; content.value=''; media.value=''; };
  document.getElementById('refresh').onclick = refresh;
  await refresh();
})();
</script>
</body>
</html>
