<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chatternet — Sign in</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{ --brand:#3498db; --brand-2:#2980b9; --bg:#f0f2f5; --card:#fff; --ink:#0f172a; }
  *{box-sizing:border-box} body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--ink)}
  .top{padding:12px 16px;background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);font-weight:800}
  .wrap{max-width:560px;margin:22px auto;padding:0 12px}
  .card{background:var(--card);border:1px solid rgba(0,0,0,.08);border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:16px}
  h1{margin:0 0 10px} .muted{color:#6b7280}
  input{width:100%;padding:10px;border:1px solid #d7d7d7;border-radius:10px;font-size:14px;margin:6px 0}
  .row{display:flex;gap:10px} .row>*{flex:1}
  button{padding:10px 14px;border:1px solid #d7d7d7;border-radius:10px;background:#fff;cursor:pointer}
  .primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .primary:hover{background:var(--brand-2)}
  .tabs{display:flex;gap:8px;margin-bottom:12px}
  .tab{padding:8px 12px;border:1px solid #e5e7eb;border-radius:999px;background:#f8fafc;cursor:pointer}
  .tab.active{background:#e9f2ff;border-color:#cfe1ff}
</style>
</head>
<body>
<div class="top">Chatternet — Account</div>
<div class="wrap">
  <div class="card">
    <div class="tabs">
      <div id="tLogin" class="tab active">Log in</div>
      <div id="tSignup" class="tab">Sign up</div>
    </div>

    <div id="loginBox">
      <h1>Log in</h1>
      <input id="liEmail" placeholder="Email">
      <input id="liPass" type="password" placeholder="Password">
      <button class="primary" id="btnLogin">Log in</button>
      <div class="muted" style="margin-top:8px">No account? Click “Sign up”.</div>
    </div>

    <div id="signupBox" style="display:none">
      <h1>Create account</h1>
      <div class="row">
        <input id="suName" placeholder="Display name (optional)">
        <input id="suAvatar" placeholder="Avatar URL (optional)">
      </div>
      <input id="suEmail" placeholder="Email">
      <input id="suPass" type="password" placeholder="Password">
      <button class="primary" id="btnSignup">Sign up</button>
      <div class="muted" style="margin-top:8px">Already have one? Click “Log in”.</div>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  function qs(k){return new URLSearchParams(location.search).get(k)||'';}
  function show(mode){
    document.getElementById('loginBox').style.display = mode==='login'?'block':'none';
    document.getElementById('signupBox').style.display = mode==='signup'?'block':'none';
    document.getElementById('tLogin').classList.toggle('active', mode==='login');
    document.getElementById('tSignup').classList.toggle('active', mode==='signup');
  }
  const initial = (qs('mode')||'login').toLowerCase();
  show(initial==='signup'?'signup':'login');

  document.getElementById('tLogin').onclick=()=>show('login');
  document.getElementById('tSignup').onclick=()=>show('signup');

  document.getElementById('btnLogin').onclick=async()=>{
    try{
      await Auth.login({ email: document.getElementById('liEmail').value, password: document.getElementById('liPass').value });
      location.href='index.html';
    }catch(e){ alert(e.message||e); }
  };

  document.getElementById('btnSignup').onclick=async()=>{
    try{
      await Auth.signup({
        email: document.getElementById('suEmail').value,
        password: document.getElementById('suPass').value,
        displayName: document.getElementById('suName').value,
        avatar: document.getElementById('suAvatar').value
      });
      location.href='index.html';
    }catch(e){ alert(e.message||e); }
  };
</script>
</body>
</html>
