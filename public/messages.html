<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Chatternet — Messages</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:0;background:#f6f7fb;color:#0f172a}
  .wrap{display:grid;grid-template-columns:280px 1fr;gap:12px;padding:16px}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px}
  .row{display:flex;align-items:center;gap:8px}
  .btn{padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;cursor:pointer}
  .btn.primary{background:#3b82f6;color:#fff;border-color:#3b82f6}
  .thread{padding:8px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;margin:6px 0}
  .thread:hover{background:#f8fafc}
  .msg{padding:6px 10px;border-radius:10px;margin:6px 0;max-width:70%}
  .mine{background:#e0f2fe;margin-left:auto}
  .theirs{background:#f1f5f9}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <strong>Threads</strong>
      <div class="row">
        <button id="refresh" class="btn">Refresh</button>
        <button id="chatbot" class="btn">Chat with Echo Bot</button>
        <a class="btn" href="/index.html">Home</a>
      </div>
    </div>
    <div id="threads"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <strong id="peerName">Select a thread</strong>
      <div class="row">
        <input id="text" placeholder="Type a message…" style="width:360px;padding:8px;border:1px solid #cbd5e1;border-radius:8px">
        <button id="send" class="btn primary">Send</button>
      </div>
    </div>
    <div id="msgs" style="margin-top:8px;max-height:60vh;overflow:auto"></div>
  </div>
</div>

<script src="/api.js"></script>
<script src="/auth.js"></script>
<script>
let ME=null, USERS=[], PEER=null;

function drawThreads(list){
  const box=document.getElementById('threads'); box.innerHTML='';
  if(!list.length){ box.innerHTML='<div class="muted">No threads yet.</div>'; return; }
  list.forEach(t=>{
    const peerId = (t.last.fromId===ME.id) ? t.last.toId : t.last.fromId;
    const peer = USERS.find(u=>String(u.id)===String(peerId));
    const el=document.createElement('div'); el.className='thread';
    el.textContent=(peer?.name||peer?.email||('User '+peerId));
    el.onclick=()=>openPeer(peer);
    box.appendChild(el);
  });
}

function drawMsgs(items){
  const box=document.getElementById('msgs'); box.innerHTML='';
  items.forEach(m=>{
    const wrap=document.createElement('div');
    wrap.className='msg ' + (String(m.fromId)===String(ME.id)?'mine':'theirs');
    wrap.textContent=m.text;
    box.appendChild(wrap);
  });
  box.scrollTop = box.scrollHeight;
}

async function openPeer(peer){
  PEER=peer; document.getElementById('peerName').textContent = peer.name||peer.email||('User '+peer.id);
  const msgs = await Api.messages.list(ME.id, peer.id);
  drawMsgs(msgs);
}

async function refreshThreads(){
  USERS = await Api.users.list();
  const t = await Api.messages.threads(ME.id);
  drawThreads(t);
}

async function sendMsg(){
  const input = document.getElementById('text');
  const txt = input.value.trim(); if(!txt || !PEER) return;
  await Api.messages.send(ME.id, PEER.id, txt);
  input.value='';
  await openPeer(PEER);
  await refreshThreads();
}

(async()=>{
  ME = await Auth.ensureAccount();
  document.getElementById('refresh').onclick = refreshThreads;
  document.getElementById('send').onclick = sendMsg;
  document.getElementById('chatbot').onclick = async ()=>{
    const bot = await Auth.getEchoBot();
    if(!bot){ alert('Bot not found'); return; }
    openPeer(bot);
  };
  await refreshThreads();
})();
</script>
</body>
</html>
