<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatternet — Messages</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:0}
  .wrap{display:grid;grid-template-columns:280px 1fr;height:100vh}
  .left{border-right:1px solid #e5e7eb;padding:12px;overflow:auto}
  .right{display:flex;flex-direction:column}
  .top{padding:12px;border-bottom:1px solid #e5e7eb}
  .msgs{flex:1;overflow:auto;padding:12px}
  .row{display:flex;gap:8px;align-items:center;padding:6px;border-bottom:1px dashed #eee;cursor:pointer}
  .row:hover{background:#f8fafc}
  .mine{background:#e8f0ff;align-self:flex-end}
  .them{background:#f3f4f6;align-self:flex-start}
  .bubble{padding:8px 10px;border-radius:12px;max-width:70%;}
  .composer{display:flex;gap:8px;padding:12px;border-top:1px solid #e5e7eb}
  input{flex:1;padding:10px;border:1px solid #d1d5db;border-radius:10px}
  .btn{padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;background:#fff;cursor:pointer}
  .primary{background:#3498db;border-color:#3498db;color:#fff}
</style>
</head><body>
<div class="wrap">
  <div class="left">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <strong>Threads</strong>
      <a href="/index.html" style="font-size:12px">Home</a>
    </div>
    <div style="margin:8px 0">
      <button class="btn" id="refresh">Refresh</button>
      <button class="btn primary" id="chatBot">Chat with Echo Bot</button>
    </div>
    <div id="threads"></div>
  </div>

  <div class="right">
    <div class="top"><strong id="peerName">Select a thread</strong></div>
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <input id="text" placeholder="Type a message…" />
      <button class="btn primary" id="send">Send</button>
    </div>
  </div>
</div>

<script src="/api.js"></script>
<script src="/auth.js"></script>
<script>
let ME, PEER=null, USERS=[];

function drawThreads(list){
  const box=document.getElementById('threads'); box.innerHTML='';
  if(!list.length){ box.innerHTML='<div class="muted">No threads yet.</div>'; return; }
  list.forEach(t=>{
    const peerId = (t.last.fromId===ME.id)? t.last.toId : t.last.fromId;
    const peer = USERS.find(u=>String(u.id)===String(peerId));
    const el=document.createElement('div'); el.className='row';
    el.textContent=(peer?.name||peer?.email||('User '+peerId));
    el.onclick=()=>openPeer(peer);
    box.appendChild(el);
  });
}

function drawMsgs(items){
  const box=document.getElementById('msgs'); box.innerHTML='';
  items.forEach(m=>{
    const mine = String(m.fromId)===String(ME.id);
    const b=document.createElement('div'); b.className='bubble '+(mine?'mine':'them');
    b.textContent = m.text;
    const wrap=document.createElement('div'); wrap.style.display='flex'; wrap.style.margin='6px 0';
    wrap.style.justifyContent = mine ? 'flex-end':'flex-start';
    wrap.appendChild(b); box.appendChild(wrap);
  });
  box.scrollTop = box.scrollHeight;
}

async function openPeer(peer){
  PEER=peer; peerName.textContent = peer?.name||peer?.email||('User '+peer.id);
  const msgs = await Api.get(`/messages?userId=${encodeURIComponent(ME.id)}&peerId=${encodeURIComponent(peer.id)}`);
  drawMsgs(msgs);
}

async function refreshThreads(){
  USERS = await Api.get('/users');
  const th = await Api.get('/threads/'+encodeURIComponent(ME.id));
  drawThreads(th);
}

async function sendMsg(){
  const t=text.value.trim(); if(!t || !PEER) return;
  await Api.post('/messages',{ fromId:ME.id, toId:PEER.id, text:t });
  text.value='';
  await openPeer(PEER);
  await refreshThreads();
}

(async()=>{
  ME = await Auth.ensureBackendUser();
  refresh.onclick = refreshThreads;
  send.onclick = sendMsg;
  chatBot.onclick = async ()=>{
    const bot = await Auth.getEchoBot();
    if(!bot){ alert('Bot not found'); return; }
    openPeer(bot);
  };
  await refreshThreads();
})();
</script>
</body></html>
