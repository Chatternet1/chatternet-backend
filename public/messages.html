<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chatternet — Messages</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{--brand:#3498db;--brand2:#2980b9;--bg:#f0f2f5;--card:#fff;--ink:#0f172a;--muted:#667085}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,Segoe UI,Arial,sans-serif}
  .top{background:var(--brand);color:#fff;padding:14px 16px;font-weight:800;display:flex;gap:8px}
  .top a{color:#fff;text-decoration:none;background:rgba(255,255,255,.15);padding:6px 10px;border-radius:8px}
  .page{max-width:1200px;margin:18px auto;padding:0 12px 28px}
  .grid{display:grid;grid-template-columns:320px 1fr;gap:14px}
  .card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:14px}
  .muted{color:var(--muted)}
  input,button,textarea{padding:10px;border:1px solid #d7d7d7;border-radius:10px;font-size:14px}
  button.primary{background:var(--brand);border-color:var(--brand);color:#fff;cursor:pointer}
  .thread{padding:10px;border:1px solid #ececec;border-radius:10px;background:#fafafa;margin:8px 0;cursor:pointer}
  .thread.active{outline:2px solid #bfd7ff}
  .msg{padding:10px;border-radius:10px;margin:6px 0;max-width:80%}
  .me{background:#e7f0ff;margin-left:auto}
  .them{background:#f5f5f5;margin-right:auto}
  .head{display:flex;align-items:center;gap:8px}
  .grow{flex:1}
</style>
</head>
<body>
  <div class="top">
    <a href="index.html">Home</a>
    <a href="/api/health" target="_blank">API Health</a>
    <div id="who" class="grow" style="text-align:right;opacity:.9;padding-right:6px"></div>
  </div>

  <div class="page">
    <div class="grid">
      <!-- LEFT: Threads -->
      <section class="card">
        <div class="head">
          <div style="font-weight:800">Conversations</div>
          <button class="primary" onclick="loadThreads()">Refresh</button>
        </div>

        <div style="margin:8px 0" class="muted">Start or open a conversation</div>
        <div class="head" style="gap:8px">
          <input id="peerEmail" placeholder="Peer email (e.g. alice@demo.test)" />
          <button class="primary" onclick="openByEmail()">Open</button>
        </div>

        <div id="threads" style="margin-top:10px"></div>
        <div id="threadsEmpty" class="muted" style="display:none;text-align:center;padding:8px">No conversations yet.</div>
      </section>

      <!-- RIGHT: Chat -->
      <section class="card">
        <div class="head">
          <div id="chatTitle" style="font-weight:800">No conversation selected</div>
          <div class="grow"></div>
          <button onclick="refreshCurrent()">Refresh</button>
        </div>

        <div id="messages" style="min-height:360px;border:1px dashed #ddd;border-radius:12px;padding:10px;margin:10px 0;overflow:auto;background:#fafafa"></div>

        <div class="head" style="gap:8px">
          <input id="msgInput" placeholder="Write a message" onkeydown="if(event.key==='Enter'){sendNow()}" />
          <button class="primary" onclick="sendNow()">Send</button>
        </div>

        <div id="status" class="muted" style="margin-top:6px"></div>
      </section>
    </div>
  </div>

<script>
const LS={SESSION:'ct_session_v1',PROFILE:'ct_profile_data_v1',MEID:'ct_backend_me_id'};
const load=(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch{return f;}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function currentEmail(){ const s=load(LS.SESSION,null); return s&&s.user ? s.user : null; }
function currentName(){ const p=load(LS.PROFILE,{})['Me']; return (p&&p.displayName)||'Me'; }
function setStatus(t){ document.getElementById('status').textContent=t||''; }

async function api(path,opts){ const r=await fetch(path,opts); if(!r.ok) throw new Error(await r.text()); return r.json(); }
const listUsers = ()=>api('/api/users');
const threadsFor = (id)=>api('/api/threads/'+encodeURIComponent(id));
const getMessages=(a,b)=>api(`/api/messages?userId=${encodeURIComponent(a)}&peerId=${encodeURIComponent(b)}`);
const postMessage=(a,b,text)=>api('/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fromId:a,toId:b,text})});
async function ensureUser(email,name){
  const users=await listUsers(); const hit=(users||[]).find(u=>u.email===email);
  if(hit) return hit;
  const j=await api('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:'local',name:name||email.split('@')[0]})});
  return j.user||j;
}

let ME=null, USERS=new Map(), CURRENT=null;

function rel(s){const d=(Date.now()-new Date(s).getTime())/1e3;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m';if(d<86400)return Math.floor(d/3600)+'h';return Math.floor(d/86400)+'d';}
function escapeHtml(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;');}

function renderThreads(items){
  const box=document.getElementById('threads'), empty=document.getElementById('threadsEmpty');
  box.innerHTML=''; if(!items.length){ empty.style.display='block'; return; } empty.style.display='none';
  items.sort((a,b)=>new Date(b.last.time)-new Date(a.last.time));
  items.forEach(t=>{
    const peer=USERS.get(t.peerId)||{name:'Unknown',email:'(missing)'};
    const div=document.createElement('div');
    div.className='thread' + (CURRENT&&CURRENT.id===t.peerId?' active':'');
    div.innerHTML=`<div style="font-weight:700">${escapeHtml(peer.name||peer.email)}</div>
      <div class="muted">${escapeHtml(peer.email||'')} • ${new Date(t.last.time).toLocaleString()} • ${rel(t.last.time)}</div>
      <div style="margin-top:4px">${escapeHtml(t.last.text||'')}</div>`;
    div.onclick=()=>openConversation(t.peerId);
    box.appendChild(div);
  });
}
function renderMessages(list){
  const box=document.getElementById('messages'); box.innerHTML='';
  if(!list.length){ box.innerHTML='<div class="muted" style="text-align:center;padding:12px">No messages. Say hi!</div>'; return; }
  list.forEach(m=>{
    const mine=m.fromId===ME.id, who=USERS.get(m.fromId)||{};
    const d=document.createElement('div');
    d.className='msg '+(mine?'me':'them');
    d.innerHTML=`<div class="muted" style="font-size:12px;margin-bottom:4px">${escapeHtml(who.name||who.email||'You')} • ${new Date(m.time).toLocaleString()} • ${rel(m.time)}</div>
      <div>${escapeHtml(m.text)}</div>`;
    box.appendChild(d);
  });
  box.scrollTop=box.scrollHeight;
}

async function refreshUsers(){ const arr=await listUsers(); USERS=new Map(arr.map(u=>[u.id,u])); }
async function loadThreads(){ try{ setStatus('Loading threads…'); await refreshUsers(); const ts=await threadsFor(ME.id); renderThreads(ts); setStatus(''); }catch(e){ setStatus('Failed to load threads'); } }
async function openConversation(peerId){ CURRENT=USERS.get(peerId); document.getElementById('chatTitle').textContent=CURRENT?(CURRENT.name||CURRENT.email):'Conversation'; renderMessages(await getMessages(ME.id,peerId)); await loadThreads(); }
async function openByEmail(){ const email=(document.getElementById('peerEmail').value||'').trim(); if(!email){ setStatus('Enter a peer email.'); return; } try{ setStatus('Opening…'); const peer=await ensureUser(email,email.split('@')[0]); await refreshUsers(); await openConversation(peer.id); setStatus(''); }catch(e){ setStatus('Open failed.'); } }
async function refreshCurrent(){ if(!CURRENT) return; try{ renderMessages(await getMessages(ME.id,CURRENT.id)); }catch{} }
async function sendNow(){ const input=document.getElementById('msgInput'); const text=input.value.trim(); if(!CURRENT){ setStatus('Open a conversation first.'); return; } if(!text){ setStatus('Type a message.'); return; } setStatus('Sending…'); try{ await postMessage(ME.id,CURRENT.id,text); input.value=''; await refreshCurrent(); await loadThreads(); setStatus(''); }catch(e){ setStatus('Send failed.'); } }

(async function boot(){
  const email=currentEmail()||'me@local.test', name=currentName();
  document.getElementById('who').textContent=`${name} <${email}>`;
  try{
    const cached=load(LS.MEID,null);
    if(cached){ const all=await listUsers(); const found=(all||[]).find(u=>u.id===cached); if(found) ME=found; }
    if(!ME){ ME=await ensureUser(email,name); save(LS.MEID,ME.id); }
    await loadThreads();
  }catch(e){ setStatus('Could not fetch user list. Check API Health.'); }
})();
</script>
</body>
</html>
