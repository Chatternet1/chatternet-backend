<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chatternet — Messages</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{--brand:#3498db;--brand2:#2980b9;--bg:#f0f2f5;--card:#fff;--ink:#0f172a;--muted:#667085}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,Segoe UI,Arial,sans-serif}
  .top{background:var(--brand);color:#fff;padding:14px 16px;font-weight:800;display:flex;gap:10px;align-items:center}
  .top a{color:#fff;text-decoration:none;background:rgba(255,255,255,.15);padding:6px 10px;border-radius:8px}
  .top .me{margin-left:auto;opacity:.9}
  .page{max-width:1200px;margin:18px auto;padding:0 12px 28px}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:12px}
  .card{background:var(--card);border:1px solid rgba(0,0,0,.08);border-radius:14px;box-shadow:0 6px 16px rgba(0,0,0,.08);padding:14px}
  .row{display:flex;gap:8px;align-items:center}
  input,button{padding:10px;border:1px solid #d7d7d7;border-radius:10px;font-size:14px}
  button{background:#fff;cursor:pointer}
  .primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .title{font-weight:800}
  .muted{color:var(--muted)}
  /* thread list */
  #threads{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .thread{border:1px solid #e6eaf2;border-radius:10px;padding:10px;background:#fafafa;cursor:pointer}
  .thread:hover{background:#f3f7ff}
  .thread.active{outline:2px solid #bfd7ff}
  .line1{font-weight:700}
  .line2{font-size:12px;color:#667085;margin-top:2px}
  .line3{font-size:13px;margin-top:6px;color:#0f172a}
  /* chat area */
  #messages{min-height:360px;border:1px dashed #ddd;border-radius:12px;padding:12px;margin:10px 0;overflow:auto;background:#fafafa}
  .msg{padding:10px;border-radius:10px;margin:6px 0;max-width:80%}
  .msg.me{background:#e7f0ff;margin-left:auto}
  .msg.them{background:#f5f5f5;margin-right:auto}
  .meta{font-size:12px;color:#667085;margin-bottom:4px}
</style>
</head>
<body>
  <div class="top">
    <span>Chatternet — Messages</span>
    <a href="index.html">Home</a>
    <a href="/api/health" target="_blank">API Health</a>
    <span id="whoTop" class="me"></span>
  </div>

  <div class="page">
    <div class="grid">
      <!-- LEFT: threads -->
      <section class="card">
        <div class="row">
          <div class="title">Conversations</div>
          <button id="refreshThreads" class="primary" style="margin-left:auto">Refresh</button>
        </div>

        <div class="muted" style="margin:8px 0">Start or open a conversation</div>
        <div class="row" style="gap:8px">
          <input id="peerEmail" placeholder="Peer email (e.g. alice@demo.test)" style="flex:1" />
          <button id="openThread" class="primary">Open</button>
        </div>

        <div id="threads" aria-label="thread-list"></div>
        <div id="threadsEmpty" class="muted" style="display:none;text-align:center;padding:8px">No conversations yet.</div>
      </section>

      <!-- RIGHT: chat -->
      <section class="card">
        <div class="row">
          <div id="chatTitle" class="title">Select a chat</div>
          <button id="refreshChat" style="margin-left:auto">Refresh</button>
        </div>

        <div id="messages"></div>
