<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chatternet — Settings</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:24px;line-height:1.45}
  label{display:block;margin:10px 0}
  .row{margin:12px 0}
  .btn{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer}
  .primary{background:#3498db;border-color:#3498db;color:#fff}
</style>
</head><body>
<h2>Settings</h2>
<p><a href="/index.html">← Home</a></p>

<div class="row">
  <label>Visibility
    <select id="vis">
      <option value="public">Public</option>
      <option value="private">Private</option>
    </select>
  </label>
  <label><input type="checkbox" id="dm"> Allow Direct Messages</label>
  <label>DM Audience
    <select id="aud"><option>everyone</option><option>friends</option></select>
  </label>
</div>
<div class="row">
  <button class="btn primary" id="save">Save</button>
</div>
<div id="status"></div>

<script src="/api.js"></script>
<script src="/auth.js"></script>
<script>
(async()=>{
  const me = await Auth.getMyUser();
  const priv = me.privacy || {};
  vis.value = (priv.visibility||'public');
  dm.checked = !!priv.dm;
  aud.value = (priv.dmAudience||'everyone');

  save.onclick = async ()=>{
    const patch = { privacy:{ visibility:vis.value, dm:dm.checked, dmAudience:aud.value } };
    const upd = await Api.put('/users/'+encodeURIComponent(me.id), patch);
    status.textContent = 'Saved at '+new Date().toLocaleTimeString();
    console.log('Updated', upd);
  };
})();
</script>
</body></html>
