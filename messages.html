<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chatternet — Messages</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    --brand:#3498db; --brand-2:#2980b9;
    --bg:#f0f2f5; --card:#fff; --ink:#0f172a;
    --muted:#667085; --line:#e6eaf2; --shadow:0 6px 16px rgba(0,0,0,.08);
    --font:'Segoe UI', Arial, system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body,*,*::before,*::after{font-family:var(--font)!important;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{margin:0;background:var(--bg);color:var(--ink)}

  /* ===== Header ===== */
  .top-bar{position:sticky;top:0;z-index:30;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .top-bar h2{margin:0;font-weight:800;letter-spacing:.2px}
  .top-actions{display:flex;gap:8px;align-items:center}
  .top-actions a, .top-actions button{background:#fff;color:#000;border:none;padding:8px 10px;border-radius:10px;cursor:pointer;text-decoration:none}
  .top-actions button:hover, .top-actions a:hover{background:#eef4ff}
  .top-actions img{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.85);object-fit:cover;cursor:pointer}

  .page{max-width:1100px;margin:18px auto;padding:0 12px 28px}
  .stack{display:grid;grid-template-columns:320px 1fr;gap:14px}
  @media (max-width:900px){.stack{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid rgba(0,0,0,.08);border-radius:14px;box-shadow:var(--shadow);padding:0}

  /* ===== Left: Chats list ===== */
  .chat-list{height:72vh;display:flex;flex-direction:column;border-radius:14px;overflow:hidden}
  .chat-head{display:flex;align-items:center;gap:8px;padding:12px;border-bottom:1px solid #ececec;background:#fff}
  .chat-head input{flex:1;padding:10px;border:1px solid #d7d7d7;border-radius:12px}
  .items{flex:1;overflow:auto;background:#fafafa}
  .row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #eee;background:#fff;cursor:pointer}
  .row:hover{background:#f7f9ff}
  .row.active{background:#eef4ff}
  .ava{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .name{font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;word-spacing:.18em}
  .last{color:#64748b;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ===== Right: Thread ===== */
  .thread{height:72vh;display:flex;flex-direction:column;border-radius:14px;overflow:hidden}
  .thead{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #ececec;background:#fff}
  .tname{font-weight:800;letter-spacing:.02em;word-spacing:.18em}
  .tbody{flex:1;overflow:auto;background:#f9fbff;padding:14px}
  .b{display:inline-block;max-width:70%;padding:10px 12px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.05);word-break:break-word;white-space:pre-wrap}
  .me{background:#e6f2ff;margin:8px 0 8px auto}
  .them{background:#fff;margin:8px 0}
  .stamp{font-size:11px;color:#94a3b8;margin-top:4px}
  .tcompose{display:flex;gap:8px;padding:12px;border-top:1px solid #ececec;background:#fff}
  .tcompose textarea{flex:1;min-height:44px;max-height:120px;padding:10px;border:1px solid #d7d7d7;border-radius:12px;resize:vertical}
  .btn{padding:10px 14px;border:1px solid #d7d7d7;border-radius:12px;background:#fff;cursor:pointer}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-2)}

  /* ===== Modals ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:2000}
  .sheet{background:#fff;border-radius:12px;max-width:520px;width:92%;max-height:80vh;overflow:auto;box-shadow:0 10px 30px rgba(0,0,0,.3);padding:16px}
  .notif-item{padding:10px;border:1px solid #eee;border-radius:10px;background:#fafafa;margin:8px 0}

  /* ===== Gate (blocks until authed) ===== */
  .gate{position:fixed;inset:0;background:linear-gradient(180deg,#f6faff,#eef4ff);display:flex;align-items:center;justify-content:center;z-index:4000}
  .gate .panel{background:#fff;border:1px solid #e6eaf2;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);width:96%;max-width:520px;padding:18px}
  .gate h3{margin:0 0 10px 0;font-weight:800}
  .gate .tabs{display:flex;gap:8px;margin-bottom:10px}
  .gate .tabs button{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #d7d7d7;background:#fff;cursor:pointer}
  .gate .tabs button.active{background:var(--brand);border-color:var(--brand);color:#fff}
  .gate .field{display:flex;flex-direction:column;gap:6px;margin:8px 0}
  .gate input{padding:10px;border:1px solid #d7d7d7;border-radius:10px}
  .gate .row{display:flex;gap:8px}
  .gate .primary{width:100%}
  .gate .note{color:#64748b;font-size:12px;margin-top:6px}
  .gate .err{color:#b00020;font-size:13px;margin-top:4px}
</style>
</head>
<body>
  <!-- ===== Header ===== -->
  <div class="top-bar">
    <h2>Messages</h2>
    <div class="top-actions">
      <a href="index.html">Home</a>
      <a href="feed.html">Feed</a>
      <a href="settings.html">Settings</a>
      <button id="btnNotif" type="button">Notifications</button>
      <button id="btnInbox" type="button">Inbox</button>
      <button id="btnMsgs" type="button" disabled>Messages</button>
      <img id="myProfile" alt="My profile" src="https://i.pravatar.cc/100?u=me" />
    </div>
  </div>

  <!-- ===== Page ===== -->
  <div class="page">
    <div class="stack">
      <div class="card chat-list">
        <div class="chat-head"><input id="search" placeholder="Search chats…"></div>
        <div id="list" class="items"></div>
      </div>

      <div class="card thread">
        <div class="thead">
          <img id="thAva" class="ava" alt="">
          <div style="flex:1">
            <div class="tname" id="thName">Select a chat</div>
            <div class="muted" id="thSub"></div>
          </div>
          <button class="btn" id="openProfile" type="button">Open Profile</button>
        </div>
        <div id="tbody" class="tbody"><div class="notif-item">Select a chat on the left to start messaging.</div></div>
        <div class="tcompose">
          <textarea id="msg" placeholder="Write a message"></textarea>
          <button id="send" class="btn primary" type="button">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Notifications Modal ===== -->
  <div class="modal-bg" id="notifBg">
    <div class="sheet">
      <h3>Notifications</h3>
      <div id="notifList"></div>
      <button id="clearNotif" class="btn primary" style="margin-top:8px;" type="button">Clear</button>
      <button id="closeNotif" class="btn" style="margin-top:8px;" type="button">Close</button>
    </div>
  </div>
  <!-- ===== Inbox Modal ===== -->
  <div class="modal-bg" id="inboxBg">
    <div class="sheet">
      <h3>Inbox</h3>
      <div id="inboxList"></div>
      <button id="closeInbox" class="btn" style="margin-top:8px;" type="button">Close</button>
    </div>
  </div>

  <!-- ===== Gate (inline, blocks until authed) ===== -->
  <div id="gate" class="gate" style="display:none">
    <div class="panel">
      <h3>Welcome to Chatternet</h3>
      <div class="tabs">
        <button id="tabLogin" class="active" type="button">Log in</button>
        <button id="tabSignup" type="button">Sign up</button>
      </div>
      <div id="loginForm">
        <div class="field"><label>Email</label><input id="liEmail" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><input id="liPass" type="password" placeholder="••••••••"></div>
        <button id="doLogin" class="btn primary" type="button">Log in</button>
        <div id="liErr" class="err"></div>
      </div>
      <div id="signupForm" style="display:none">
        <div class="field"><label>Name</label><input id="suName" placeholder="Jane Doe"></div>
        <div class="field"><label>Email</label><input id="suEmail" type="email" placeholder="jane@example.com"></div>
        <div class="field"><label>Password</label><input id="suPass" type="password" placeholder="Choose a password"></div>
        <button id="doSignup" class="btn primary" type="button">Create account</button>
        <div class="note">We'll log you in right after sign-up.</div>
        <div id="suErr" class="err"></div>
      </div>
    </div>
  </div>

<script>
/********************
 * CONFIG (no localStorage)
 ********************/
const API='https://chatternet-backend-1.onrender.com/api';

// In-memory state only (no Local Storage)
let SESSION = null;    // { userId, email, token? }
let ME_USER = null;    // full /users/:id
let ALL_USERS = [];    // fetched from /users
let THREAD_SNIPPETS = {}; // {peerId: {text, time}}

// Ephemeral notifications/inbox (session-only)
const NOTIFS=[]; const INBOX=[];

/********
 * UTILS *
 ********/
const $=s=>document.querySelector(s);
const $$=s=>Array.from(document.querySelectorAll(s));
const nowISO=()=>new Date().toISOString();
const esc=s=>String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll(\"'\",\"&#39;\");
function avatarOf(u){ return (u && u.avatar) ? u.avatar : ('https://i.pravatar.cc/100?u='+encodeURIComponent(u?.email||u?.name||'user')); }

async function api(path,opts={}){
  const headers={'Content-Type':'application/json'};
  if(SESSION?.token) headers['Authorization']='Bearer '+SESSION.token;
  const r=await fetch(API+path,{headers,credentials:'include',...opts});
  const t=await r.text();
  let j={};
  try{ j = t? JSON.parse(t) : {}; }catch{}
  if(!r.ok) throw new Error(j.error||t||('HTTP '+r.status));
  return j;
}

// Endpoints
const getUsers    = ()=>api('/users');
const getUserById = (id)=>api('/users/'+encodeURIComponent(id));
const getThreads  = (uid)=>api('/threads/'+encodeURIComponent(uid));
const getMessages = (a,b)=>api(`/messages?userId=${encodeURIComponent(a)}&peerId=${encodeURIComponent(b)}`);
const postMessage = (a,b,t)=>api('/messages',{method:'POST',body:JSON.stringify({fromId:a,toId:b,text:t})});

/****************
 * HEADER & MODALS
 ****************/
function setHeaderAvatar(){
  const img = $('#myProfile');
  if(!img) return;
  img.src = avatarOf(ME_USER||{name:'Me'});
}
$('#myProfile').onclick=()=>location.href='profile.html';
$('#btnMsgs').onclick=()=>location.href='messages.html';

function addNotif(text){ NOTIFS.unshift({id:Date.now(),text,time:nowISO()}); }
function addInbox(text){ INBOX.unshift({id:Date.now(),text,time:nowISO()}); }

function renderNotif(){
  const el=$('#notifList'); el.innerHTML='';
  if(!NOTIFS.length){ el.innerHTML='<div class=\"notif-item\">No notifications yet.</div>'; return; }
  NOTIFS.forEach(n=>{ const d=document.createElement('div'); d.className='notif-item'; d.innerHTML=`<strong>${new Date(n.time).toLocaleString()}</strong><br>${esc(n.text)}`; el.appendChild(d); });
}
$('#btnNotif').onclick=()=>{ renderNotif(); $('#notifBg').style.display='flex'; };
$('#clearNotif').onclick=()=>{ NOTIFS.length=0; renderNotif(); };
$('#closeNotif').onclick=()=>{ $('#notifBg').style.display='none'; };

function renderInbox(){
  const el=$('#inboxList'); el.innerHTML='';
  if(!INBOX.length){ el.innerHTML='<div class=\"notif-item\">Inbox is empty.</div>'; return; }
  INBOX.forEach(n=>{ const d=document.createElement('div'); d.className='notif-item'; d.innerHTML=`<strong>${new Date(n.time).toLocaleString()}</strong><br>${esc(n.text)}`; el.appendChild(d); });
}
$('#btnInbox').onclick=()=>{ renderInbox(); $('#inboxBg').style.display='flex'; };
$('#closeInbox').onclick=()=>{ $('#inboxBg').style.display='none'; };

/*****************
 * AUTH GATE
 *****************/
function showGate(on){ $('#gate').style.display = on ? 'flex' : 'none'; }
function setTab(which){
  $('#tabLogin').classList.toggle('active',which==='login');
  $('#tabSignup').classList.toggle('active',which==='signup');
  $('#loginForm').style.display = which==='login' ? 'block' : 'none';
  $('#signupForm').style.display = which==='signup' ? 'block' : 'none';
}
$('#tabLogin').onclick=()=>setTab('login');
$('#tabSignup').onclick=()=>setTab('signup');

function showError(id,msg){ const el=$(id); if(el) el.textContent=msg; }

async function doLogin(){
  const email=$('#liEmail').value.trim();
  const password=$('#liPass').value.trim();
  showError('#liErr','');
  if(!email||!password){ showError('#liErr','Enter email and password.'); return; }
  try{
    const j = await api('/login',{method:'POST',body:JSON.stringify({email,password})});
    const payload = j.user || j;
    SESSION = { userId: payload.id || payload.userId || payload._id || payload.uid, email: payload.email || email, token: j.token || payload.token || null };
    await afterAuth();
  }catch(e){ showError('#liErr', String(e.message||e).replace(/\\n.*/,'')); }
}
async function doSignup(){
  const name=$('#suName').value.trim();
  const email=$('#suEmail').value.trim();
  const password=$('#suPass').value.trim();
  showError('#suErr','');
  if(!name||!email||!password){ showError('#suErr','Please complete all fields.'); return; }
  try{
    await api('/signup',{method:'POST',body:JSON.stringify({name,email,password})});
    const j = await api('/login',{method:'POST',body:JSON.stringify({email,password})});
    const payload = j.user || j;
    SESSION = { userId: payload.id || payload.userId || payload._id || payload.uid, email: payload.email || email, token: j.token || payload.token || null };
    await afterAuth();
  }catch(e){ showError('#suErr', String(e.message||e).replace(/\\n.*/,'')); }
}
$('#doLogin').onclick=doLogin;
$('#doSignup').onclick=doSignup;

async function afterAuth(){
  if(!SESSION?.userId){ showGate(true); return; }
  ME_USER = await getUserById(SESSION.userId).catch(()=>null);
  if(!ME_USER){ showGate(true); return; }
  setHeaderAvatar();
  addNotif('Signed in as '+(ME_USER.name||ME_USER.email||'you'));
  showGate(false);
  bootApp();
}

/*****************
 * CHATS / THREAD *
 *****************/
// Optional bots (in-memory only, for testing when no one else is online)
const BOTS=[
  {name:'Bill Thomas',u:'bill.thomas'},
  {name:'Kate White',u:'kate.white'},
  {name:'Michael Reed',u:'michael.reed'},
  {name:'Olivia Perez',u:'olivia.perez'},
  {name:'Daniel Foster',u:'daniel.foster'}
];
const BOT_USERS = BOTS.map(b=>({id:'bot:'+b.u, name:b.name, email:b.u+'@example.com', avatar:'https://i.pravatar.cc/100?u='+encodeURIComponent(b.u)}));
const isBot = u => String(u.id||'').startsWith('bot:');
const botReply = t => {
  const s=(t||'').trim().toLowerCase();
  if(!s) return '🙂';
  if(s.includes('hello')||s.includes('hi')) return 'Hi!';
  if(s.includes('?')) return 'Good question. It depends!';
  return 'Nice!';
};

let USERS=[];           // merged list
let CURRENT=null;       // current peer
const listEl=$('#list'), tbody=$('#tbody'), thAva=$('#thAva'), thName=$('#thName'), thSub=$('#thSub'), input=$('#msg');

// In-memory bot conversations only
const BOT_LOCAL = {}; // key=peerId, value=[{fromId,toId,text,time}]

function lkey(peer){ return String(peer.id); }
function getLocal(peer){ return BOT_LOCAL[lkey(peer)]||[]; }
function addLocal(peer,msg){ BOT_LOCAL[lkey(peer)] = (BOT_LOCAL[lkey(peer)]||[]).concat([msg]); }

function row(u,last=''){
  const d=document.createElement('div'); d.className='row'; d.dataset.id=u.id;
  d.innerHTML=`<img class=\"ava\" src=\"${avatarOf(u)}\" alt=\"\"><div style=\"min-width:0\"><div class=\"name\">${esc(u.name)}</div><div class=\"last\">${esc(last||' ')}</div></div>`;
  d.onclick=()=>openChat(u);
  return d;
}
function renderList(){
  const q=($('#search').value||'').toLowerCase();
  listEl.innerHTML='';
  USERS.filter(u=>String(u.id)!==String(ME_USER.id))
       .filter(u=>u.name.toLowerCase().includes(q))
       .forEach(u=>{
         const last = THREAD_SNIPPETS[u.id]?.text || (isBot(u) ? (getLocal(u).slice(-1)[0]?.text||'') : '');
         listEl.appendChild(row(u,last));
       });
  [...listEl.children].forEach(el=>el.classList.toggle('active', el.dataset.id===(CURRENT?.id||'')));
}

async function renderThread(){
  if(!CURRENT){ tbody.innerHTML='<div class=\"notif-item\">Select a chat on the left to start messaging.</div>'; return; }
  thAva.src=avatarOf(CURRENT); thName.textContent=CURRENT.name; thSub.textContent=isBot(CURRENT)?'Bot':'';
  $('#openProfile').onclick=()=>{ location.href='profile.html?user='+encodeURIComponent(CURRENT.id); };
  tbody.innerHTML='';
  const add=(me,t,time)=>{
    const w=document.createElement('div');
    w.innerHTML=`<div class=\"b ${me?'me':'them'}\">${esc(t)}</div><div class=\"stamp\">${new Date(time).toLocaleString()}</div>`;
    tbody.appendChild(w);
  };

  let msgs=[];
  if(isBot(CURRENT)){
    msgs = getLocal(CURRENT);
  }else{
    try{ msgs = await getMessages(ME_USER.id, CURRENT.id); }catch{ msgs=[]; }
  }
  msgs.forEach(m=>add(String(m.fromId)===String(ME_USER.id), m.text, m.time||m.createdAt||nowISO()));
  tbody.scrollTop=tbody.scrollHeight;
}

async function openChat(u){
  CURRENT=u;
  [...listEl.children].forEach(el=>el.classList.toggle('active', el.dataset.id===u.id));
  await renderThread();
}

$('#send').onclick=async()=>{
  const t=(input.value||'').trim(); if(!t||!CURRENT) return; input.value='';
  if(isBot(CURRENT)){
    addLocal(CURRENT,{id:'m'+Date.now(),fromId:ME_USER.id,toId:CURRENT.id,text:t,time:nowISO()}); 
    await renderThread();
    setTimeout(()=>{ addLocal(CURRENT,{id:'m'+Date.now(),fromId:CURRENT.id,toId:ME_USER.id,text:botReply(t),time:nowISO()}); renderThread(); }, 600+Math.random()*600);
  }else{
    try{ await postMessage(ME_USER.id,CURRENT.id,t); await renderThread(); }
    catch(e){ alert('Failed to send: '+(e.message||e)); }
  }
};

/********
 * BOOT *
 ********/
async function bootApp(){
  try{
    if(!SESSION?.userId){ showGate(true); return; }
    if(!ME_USER){ ME_USER = await getUserById(SESSION.userId); }
    setHeaderAvatar();

    // pull users & threads
    ALL_USERS = await getUsers().catch(()=>[]);
    if(!ALL_USERS.find(u=>String(u.id)===String(ME_USER.id))) ALL_USERS.unshift(ME_USER);

    // merge in bots (for demo)
    USERS = [...ALL_USERS, ...BOT_USERS];

    // thread snippets
    THREAD_SNIPPETS = {};
    try{
      const th = await getThreads(ME_USER.id);
      th.forEach(t=>{ if(t.peerId) THREAD_SNIPPETS[t.peerId] = {text: t.last?.text||'', time: new Date(t.last?.time||0).getTime()}; });
    }catch{}

    renderList();

    // Auto-open first non-self user if none selected
    const target = USERS.find(u=>String(u.id)!==String(ME_USER.id));
    if(target) openChat(target);
  }catch(e){
    console.error(e);
    showGate(true);
  }
}

/************************
 * INITIAL (no persisted session -> show gate)
 ************************/
(function init(){
  // No persisted session — always show gate first
  showGate(true);
})();

// Search
$('#search').addEventListener('input',()=>renderList());
</script>
</body>
</html>
